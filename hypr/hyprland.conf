

# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

autogenerated = 0

monitor = , 1920x1080@60, 0x0, 1

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = hyprlauncher

input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    
    # Если хочешь переключаться по Caps Lock, вместо alt_shift_toggle напиши: grp:caps_toggle
    # Если хочешь, чтобы на Caps Lock переключался язык, а родной светодиод CapsLock загорался, когда включен русский, добавь: grp_led:caps
    
    follow_mouse = 1
    # ... остальные твои настройки мыши/тачпада ниже не трогай
}

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu

bind = $mainMod, 1, workspace, 1

bind = $mainMod, 2, workspace, 2

bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

bind = $mainMod, 5, workspace, 5

bind = $mainMod, 6, workspace, 6

bind = $mainMod, 7, workspace, 7

bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Жесткий буст микрофона до 1000% (шаг 20%)
binde = SUPER, period, exec, wpctl set-volume -l 10.0 @DEFAULT_AUDIO_SOURCE@ 5%+

# Уменьшение громкости микрофона (шаг 20%)
binde = SUPER, comma, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-


animations {
    enabled = true

    # Ультра-мягкая кривая (очень плавное замедление в конце)
    bezier = myBezier, 0.25, 1, 0.5, 1

    # Анимации окон оставляем аккуратными
    animation = windows, 1, 4, myBezier, popin 80%
    animation = windowsOut, 1, 4, myBezier, popin 80%
    animation = fade, 1, 4, myBezier

    # ТО САМОЕ НЕЗАМЕТНОЕ ПЕРЕКЛЮЧЕНИЕ
    # slidefade 15% означает, что окно сдвинется всего на 15% ширины экрана, 
    # параллельно растворяясь в прозрачность. Скорость "4" — быстро, но чертовски гладко.
    animation = workspaces, 1, 4, myBezier, slidefade 15%
}

decoration {
    rounding = 0 # Твой строгий стиль

    # Делаем так, чтобы неактивные или уходящие окна слегка темнели и серели
    dim_inactive = true
    dim_strength = 0.3 # Насколько сильно затенять (0.3 — идеальный серый налет)
    dim_special = 0.5

    # Цвет границы: активная — светло-серая, неактивная — темно-серая
    
}

general {
    # твои старые настройки general...
    
    col.active_border = rgba(555555aa) # или какие там у тебя цвета
    col.inactive_border = rgba(111111aa)
}


# Меню выбора обоев (.jpg)
bind = $mainMod, A, exec, ~/linux_betterwindows/waybar/scripts/wallpaper_menu.sh

exec-once = waybar
exec-once = hyprpaper

# Управление окнами с помощью мыши (SUPER + ЛКМ/ПКМ)
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
# Меню всех приложений (Rofi) на Super + F
bind = SUPER, F, exec, rofi -show drun -theme ~/.config/rofi/dark-half.rasi

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
   binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
   bind  = , XF86AudioMute, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ toggle



bind = SUPER_SHIFT, S, exec, grim -g "$(slurp -b 000000a0 -c ffffffff -s 00000000)" - | wl-copy

# Вместо переменной $1 передаем точное имя файла прямо из бинда
bind = $mainMod, W, exec, change-wallpaper
exec-once = wal -R
exec-once = swaync
